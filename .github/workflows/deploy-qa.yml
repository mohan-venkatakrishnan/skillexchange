name: Deploy QA
on:
  push:
    branches: [qa]
  workflow_dispatch:

concurrency: deploy-qa

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: E2E tests (mock mode)
        run: |
          npx playwright install --with-deps chromium
          VITE_USE_MOCK=true npm run build
          npm run test:e2e
      - name: Write deploy env
        run: printf '%s' "$ENV_DEPLOY_QA" > .env.deploy.qa
        env:
          ENV_DEPLOY_QA: ${{ secrets.ENV_DEPLOY_QA }}
      - name: Deploy to QA
        run: bash scripts/deploy.sh qa
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Live regression vs QA (release gate)
        run: npm run test:regression
        env:
          REGRESSION_URL: https://skillexchangeqa.tapdot.org
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
